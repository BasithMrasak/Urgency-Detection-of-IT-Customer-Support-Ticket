<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Ticket Urgency Detector - Analyze</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1e5d72 0%, #2a5298 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem;
        }

        .card {
            background-color: #ffffff;
            width: 100%;
            max-width: 700px;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            padding: 1.5rem;
            position: relative;
        }

        .exit-btn {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: rgba(255, 255, 255, 0.2);
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 0.5rem 1rem;
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }

        .exit-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.05);
        }

        .header h1 {
            font-size: 1.8rem;
            color: #ffffff;
            text-align: center;
            font-weight: 700;
            margin: 0;
        }

        .content {
            padding: 2rem;
        }

        .intro {
            text-align: center;
            margin-bottom: 2rem;
            padding: 1rem;
            background: #f8f9fa;
            border-radius: 8px;
        }

        .intro p {
            color: #495057;
            font-size: 0.95rem;
            line-height: 1.5;
            margin: 0;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-weight: 600;
            color: #1e3c72;
            margin-bottom: 0.5rem;
            font-size: 0.95rem;
        }

        input[type="text"], textarea {
            width: 100%;
            padding: 0.9rem;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            font-size: 0.95rem;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus, textarea:focus {
            border-color: #2a5298;
            box-shadow: 0 0 0 3px rgba(42, 82, 152, 0.1);
            outline: none;
        }

        textarea {
            resize: vertical;
            min-height: 120px;
        }

        .btn {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: #ffffff;
            padding: 1rem;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(30, 60, 114, 0.3);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(30, 60, 114, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .error-message {
            color: #dc3545;
            font-size: 0.9rem;
            font-weight: 500;
            background-color: #f8d7da;
            padding: 1rem;
            border-radius: 8px;
            border-left: 4px solid #dc3545;
        }

        @media (max-width: 600px) {
            .card {
                border-radius: 12px;
            }

            .header {
                padding: 1.2rem;
            }

            .exit-btn {
                position: static;
                display: block;
                width: 100%;
                text-align: center;
                margin-bottom: 1rem;
            }

            .header h1 {
                font-size: 1.4rem;
            }

            .content {
                padding: 1.5rem;
            }

            textarea {
                min-height: 100px;
            }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="header">
            <a href="/" class="exit-btn">← Exit</a>
            <h1>🎫 Ticket Analysis</h1>
        </div>

        <div class="content">
            <div class="intro">
                <p>Enter your support ticket details below to analyze urgency levels using AI-powered classification.</p>
            </div>

            <form method="POST" action="/home">
                {% if error %}
                    <div class="error-message">⚠️ {{ error }}</div>
                {% endif %}

                <div class="form-group">
                    <label for="subject">Ticket Subject</label>
                    <input type="text" id="subject" name="subject" placeholder="e.g., Unable to access account" value="{{ subject|default('') }}" required>
                </div>

                <div class="form-group">
                    <label for="body">Ticket Description</label>
                    <textarea id="body" name="body" placeholder="Provide detailed description of the issue..." required>{{ body|default('') }}</textarea>
                </div>

                <button type="submit" class="btn">Analyze Urgency →</button>
            </form>
        </div>
    </div>
</body>
</html>
