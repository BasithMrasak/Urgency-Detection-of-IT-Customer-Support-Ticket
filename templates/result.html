<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Ticket Urgency Detector - Result</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1e5d72 0%, #2a5298 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .container {
            max-width: 750px;
            width: 100%;
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            padding: 1.5rem;
            text-align: center;
        }

        .header h1 {
            font-size: 1.8rem;
            font-weight: 700;
            color: #ffffff;
            margin: 0;
        }

        .content {
            padding: 2rem;
        }

        .urgency-badge {
            text-align: center;
            padding: 1.5rem;
            border-radius: 12px;
            margin-bottom: 2rem;
            position: relative;
        }

        .urgency-badge.low {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
        }

        .urgency-badge.medium {
            background: linear-gradient(135deg, #f09819 0%, #ff512f 100%);
        }

        .urgency-badge.high {
            background: linear-gradient(135deg, #eb3349 0%, #f45c43 100%);
        }

        .urgency-label {
            font-size: 0.9rem;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.9);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.5rem;
        }

        .urgency-value {
            font-size: 2.5rem;
            font-weight: 800;
            color: #ffffff;
            text-transform: uppercase;
        }

        .ticket-info {
            display: grid;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .info-card {
            background: #f8f9fa;
            padding: 1rem;
            border-radius: 8px;
            border-left: 4px solid #2a5298;
        }

        .info-label {
            font-size: 0.85rem;
            font-weight: 600;
            color: #6c757d;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.5rem;
        }

        .info-value {
            font-size: 0.95rem;
            color: #333333;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .actions {
            display: flex;
            gap: 1rem;
            justify-content: center;
        }

        .btn {
            padding: 0.8rem 2rem;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }

        .btn-primary {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: #ffffff;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(42, 82, 152, 0.4);
        }

        .btn-secondary {
            background: #ffffff;
            color: #2a5298;
            border: 2px solid #2a5298;
        }

        .btn-secondary:hover {
            background: #2a5298;
            color: #ffffff;
            transform: translateY(-2px);
        }

        @media (max-width: 600px) {
            .header h1 {
                font-size: 1.4rem;
            }

            .urgency-value {
                font-size: 2rem;
            }

            .actions {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }

            .content {
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎫 Urgency Analysis Complete</h1>
        </div>

        <div class="content">
            <div class="urgency-badge {{ prediction }}">
                <div class="urgency-label">Urgency Level</div>
                <div class="urgency-value">{{ prediction }}</div>
            </div>

            <div class="ticket-info">
                <div class="info-card">
                    <div class="info-label">Subject</div>
                    <div class="info-value">{{ subject }}</div>
                </div>

                <div class="info-card">
                    <div class="info-label">Description</div>
                    <div class="info-value">{{ body }}</div>
                </div>
            </div>

            <div class="actions">
                <a href="/home" class="btn btn-primary">Analyze Another Ticket</a>
                <a href="/" class="btn btn-secondary">Back to Home</a>
            </div>
        </div>
    </div>
</body>
</html>
